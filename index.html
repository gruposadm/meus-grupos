/* BOTÕES */

.button{
display:block;
margin:14px auto;
padding:16px;
width:320px;
color:white;
text-decoration:none;
border-radius:12px;
font-size:17px;
position:relative;
overflow:hidden;
transition:0.3s;
}

/* Efeito de brilho */

.button::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.6s;
}

.button:hover::before{
left:100%;
}

/* Efeito de movimento */

.button:hover{
transform:scale(1.08);
}

/* cores */

.whatsapp{
background:#25D366;
}

}
